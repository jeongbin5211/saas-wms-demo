spring:
  application:
    name: wms-backend

  datasource:
    url: jdbc:mysql://localhost:3306/withworks_demo?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: wms_user
    password: wms_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
    show-sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:local-dev}
            client-secret: ${GOOGLE_CLIENT_SECRET:local-dev}
            scope:
              - email
              - profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID:local-dev}
            client-secret: ${KAKAO_CLIENT_SECRET:local-dev}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-authentication-method: client_secret_post
            scope:
              - account_email
              - profile_nickname
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

server:
  port: 8080

jwt:
  secret: wms-demo-secret-key-must-be-changed-in-production-256bits-minimum
  expiration-hours: 8

oauth2:
  redirect-uri: http://localhost:5173/oauth2/callback
